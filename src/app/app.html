<div class="min-h-screen bg-slate-950 text-slate-100">
  <div class="mx-auto flex min-h-screen w-full max-w-6xl flex-col px-4 py-5 sm:px-6 lg:px-8">
    <header
      class="mb-8 overflow-hidden rounded-[1.75rem] border border-white/10 bg-white/[0.04] shadow-2xl shadow-black/30 backdrop-blur sm:rounded-[2rem]"
    >
      <div class="flex justify-end px-5 pt-4 sm:px-6 lg:px-8">
        <div class="flex items-center rounded-full border border-white/10 bg-slate-900/80 p-1">
          <button
            type="button"
            (click)="setLanguage('en')"
            class="rounded-full px-3 py-1.5 text-xs font-semibold transition"
            [class.bg-cyan-400]="language() === 'en'"
            [class.text-slate-950]="language() === 'en'"
            [class.text-slate-300]="language() !== 'en'"
          >
            EN
          </button>

          <button
            type="button"
            (click)="setLanguage('ru')"
            class="rounded-full px-3 py-1.5 text-xs font-semibold transition"
            [class.bg-cyan-400]="language() === 'ru'"
            [class.text-slate-950]="language() === 'ru'"
            [class.text-slate-300]="language() !== 'ru'"
          >
            RU
          </button>
        </div>
      </div>
      <div class="grid gap-6 p-5 sm:p-6 md:grid-cols-[8rem_1fr] md:items-start lg:p-8">
        <div
          class="h-28 w-28 overflow-hidden rounded-3xl border border-cyan-300/30 bg-cyan-300/10 shadow-lg shadow-cyan-950/30 sm:h-32 sm:w-32"
        >
          <img
            src="/images/profile.jpg"
            alt="Snezhana Novitskaya"
            class="h-full w-full object-cover object-top"
          />
        </div>

        <div class="min-w-0">
          <p
            class="mb-3 text-xs font-semibold uppercase tracking-[0.28em] text-cyan-300 sm:text-sm"
          >
            {{ content().label }}
          </p>

          <h1
            class="max-w-3xl bg-gradient-to-r from-white via-white to-cyan-300 bg-clip-text text-4xl font-bold tracking-tight text-transparent sm:text-5xl lg:text-6xl"
          >
            {{ content().title }}
          </h1>

          <p class="mt-3 max-w-2xl text-xl font-semibold text-slate-200">
            {{ content().position }}
          </p>

          <p class="mt-4 max-w-3xl text-base leading-7 text-slate-300">
            {{ content().description }}
          </p>

          <div class="mt-5 flex flex-wrap gap-2">
            <span
              class="rounded-full rounded-full border border-cyan-400/20 bg-cyan-400/10 px-3 py-1 text-sm text-cyan-200"
            >
              Angular 17–21
            </span>

            <span
              class="rounded-full border border-cyan-400/20 bg-cyan-400/10 px-3 py-1 text-sm text-cyan-200"
            >
              TypeScript
            </span>

            <span
              class="rounded-full border border-cyan-400/20 bg-cyan-400/10 px-3 py-1 text-sm text-cyan-200"
            >
              RxJS
            </span>

            <span
              class="rounded-full border border-cyan-400/20 bg-cyan-400/10 px-3 py-1 text-sm text-cyan-200"
            >
              Signals
            </span>

            <span
              class="rounded-full border border-cyan-400/20 bg-cyan-400/10 px-3 py-1 text-sm text-cyan-200"
            >
              GraphQL
            </span>

            <span
              class="rounded-full border border-cyan-400/20 bg-cyan-400/10 px-3 py-1 text-sm text-cyan-200"
            >
              UI Architecture
            </span>
          </div>

          <div class="mt-6 flex flex-wrap gap-3">
            <a
              href="https://www.linkedin.com/in/snezhana-novitskaya"
              target="_blank"
              rel="noreferrer"
              class="rounded-full border border-white/15 px-5 py-2.5 text-sm font-semibold text-slate-200 transition hover:border-red-300 hover:text-red-200"
            >
              LinkedIn
            </a>

            <a
              href="https://github.com/Snowwe"
              target="_blank"
              rel="noreferrer"
              class="rounded-full border border-white/15 px-5 py-2.5 text-sm font-semibold text-slate-200 transition hover:border-red-300 hover:text-red-200"
            >
              GitHub
            </a>

            <a
              href="https://t.me/snowweN"
              target="_blank"
              rel="noreferrer"
              class="rounded-full border border-white/15 px-5 py-2.5 text-sm font-semibold text-slate-200 transition hover:border-red-300 hover:text-red-200"
            >
              Telegram
            </a>
          </div>
        </div>
      </div>

      <nav
        class="grid grid-cols-2 gap-4 border-t border-white/10 bg-slate-900/80 px-4 py-2 sm:flex"
      >
        <a
          routerLink="/about"
          routerLinkActive="bg-cyan-400 text-slate-950"
          class="rounded-2xl px-4 py-3 text-center text-sm font-semibold text-slate-300 transition hover:text-white"
        >
          {{ content().about }}
        </a>

        <a
          routerLink="/resume"
          routerLinkActive="bg-cyan-400 text-slate-950"
          class="rounded-2xl px-4 py-3 text-center text-sm font-semibold text-slate-300 transition hover:text-white"
        >
          {{ content().resume }}
        </a>

        <a
          routerLink="/game-lab"
          routerLinkActive="bg-cyan-400 text-slate-950"
          class="rounded-2xl px-4 py-3 text-center text-sm font-semibold text-slate-300 transition hover:text-white"
        >
          {{ content().gameLab }}
        </a>

        <a
          routerLink="/roadmap"
          routerLinkActive="bg-cyan-400 text-slate-950"
          class="rounded-2xl px-4 py-3 text-center text-sm font-semibold text-slate-300 transition hover:text-white"
        >
          {{ content().roadmap }}
        </a>
      </nav>
    </header>

    <main class="flex-1">
      <router-outlet />
    </main>
  </div>
</div>
